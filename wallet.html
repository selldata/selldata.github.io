<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Wallet Details</h2>
        </div>
        <div class="form-group">
            <label>Your UPI ID for Withdrawal</label>
            <input type="text" id="upiInput" placeholder="example@upi">
        </div>
        <button class="btn" onclick="saveUpi()">Save UPI ID</button>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html">Dash</a>
        <a href="wallet.html" class="active">Wallet</a>
        <a href="balance.html">Withdraw</a>
        <a href="profile.html">Profile</a>
    </div>

    <script src="app.js"></script>
    <script>
        requireAuth();
        let user = getCurrentUser();
        document.getElementById('upiInput').value = user.upiId;

        function saveUpi() {
            const upi = document.getElementById('upiInput').value.trim();
            user.upiId = upi;
            updateCurrentUser(user);
            alert("UPI ID updated successfully!");
        }
    </script>
</body>
</html>
