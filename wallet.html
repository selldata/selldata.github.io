<!DOCTYPE html>
<html>
<head>
  <title>Wallet</title>
  <style>
    body {background:#0f172a; color:white; text-align:center;}
    input,button {padding:10px; margin:10px;}
  </style>
</head>
<body>

<h2>Wallet</h2>
<input id="upi" placeholder="Enter UPI"><br>
<button onclick="saveUPI()">Save</button><br><br>
<button onclick="back()">Back</button>

<script>
let user=localStorage.getItem("currentUser");
let data=JSON.parse(localStorage.getItem(user));

function saveUPI(){
  data.upi=document.getElementById("upi").value;
  localStorage.setItem(user, JSON.stringify(data));
  alert("Saved");
}

function back(){ window.location="dashboard.html"; }
</script>

</body>
</html>
