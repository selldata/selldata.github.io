<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {background:#0f172a; color:white; text-align:center; font-family:Arial;}
    input,button {padding:10px; margin:10px; border-radius:8px;}
    button {background:#22c55e; color:white;}
  </style>
</head>
<body>

<h2>Login</h2>

<input id="user" placeholder="Username"><br>
<button onclick="login()">Login</button>

<p>No account? <a href="index.html" style="color:lightblue;">Register</a></p>

<script>
function login(){
  let user=document.getElementById("user").value;

  if(localStorage.getItem(user)){
    localStorage.setItem("currentUser", user);
    window.location="dashboard.html";
  } else {
    alert("User not found");
  }
}
</script>

</body>
</html>
