<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="margin-top: 50px;">
        <div class="header">
            <h1>Create Account</h1>
        </div>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Choose a username">
        </div>
        <button class="btn" onclick="register()">Register</button>
        <p style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: var(--primary);">Already have an account? Login</a>
        </p>
    </div>

    <script src="app.js"></script>
    <script>
        function register() {
            const name = document.getElementById('name').value.trim();
            const username = document.getElementById('username').value.trim();
            
            if(!name || !username) return alert("Fill all fields");

            let users = getUsers();
            if(users.find(u => u.username === username)) {
                return alert("Username already exists!");
            }

            users.push({
                name, username, balance: 0, upiId: "",
                planRequested: false, planUtr: "", isVerified: false,
                withdrawRequested: false, withdrawAmount: 0
            });
            
            saveUsers(users);
            alert("Registration successful!");
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
