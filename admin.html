<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container { max-width: 500px; margin-bottom: 50px; }
        .tab-container { display: flex; background: var(--card); border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .tab-btn.active-tab { background: var(--primary); color: white; }
        .admin-card { border-left: 4px solid var(--primary); }
        .admin-card.plan-card { border-left-color: var(--warning); }
        .admin-card.withdraw-card { border-left-color: var(--danger); }
        .admin-card.completed-card { border-left-color: var(--success); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Admin Panel</h1>
            <p>Manage Approvals & Users</p>
        </div>

        <div class="tab-container">
            <button class="tab-btn active-tab" id="tab-plans" onclick="setTab('plans')">Pending Plans</button>
            <button class="tab-btn" id="tab-withdraws" onclick="setTab('withdraws')">Pending Withdraws</button>
            <button class="tab-btn" id="tab-completed" onclick="setTab('completed')">Completed / All</button>
        </div>

        <div id="usersList"></div>
    </div>

    <script src="app.js"></script>
    <script>
        let currentTab = 'plans';

        function setTab(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab'));
            document.getElementById('tab-' + tabName).classList.add('active-tab');
            loadAdminUI();
        }

        function loadAdminUI() {
            const users = getUsers();
            const list = document.getElementById('usersList');
            list.innerHTML = "";

            let filteredUsers = [];
            if (currentTab === 'plans') {
                filteredUsers = users.filter(u => u.planRequested && !u.isVerified);
            } else if (currentTab === 'withdraws') {
                filteredUsers = users.filter(u => u.withdrawRequested);
            } else if (currentTab === 'completed') {
                filteredUsers = users.filter(u => (!u.planRequested || u.isVerified) && !u.withdrawRequested);
            }

            if(filteredUsers.length === 0) return list.innerHTML = `<p style='text-align:center; color:var(--text-muted); margin-top:30px;'>No data in this section.</p>`;

            filteredUsers.forEach(u => {
                let html = `<div class="admin-card ${currentTab}-card">
                    <h3 style="margin-bottom: 8px;">${u.name} (@${u.username})</h3>
                    <p><strong>Balance:</strong> ₹${u.balance}</p>`;

                if (currentTab === 'plans') {
                    html += `
                        <p style="color:var(--warning); margin-top:5px;">⏳ Waiting for Plan Approval</p>
                        <p><strong>UTR Number:</strong> ${u.planUtr}</p>
                        <div class="action-btns">
                            <button class="btn btn-success" onclick="approvePlan('${u.username}')">Approve Plan</button>
                            <button class="btn btn-danger" onclick="rejectPlan('${u.username}')">Reject Plan</button>
                        </div>`;
                } else if (currentTab === 'withdraws') {
                    html += `
                        <p style="color:var(--danger); margin-top:5px;">💸 Withdrawal Requested</p>
                        <p><strong>Amount:</strong> ₹${u.withdrawAmount}</p>
                        <p><strong>UPI ID:</strong> ${u.upiId}</p>
                        <div class="action-btns">
                            <button class="btn btn-success" onclick="approveWithdraw('${u.username}')">Approve Withdraw</button>
                            <button class="btn btn-danger" onclick="rejectWithdraw('${u.username}')">Reject Withdraw</button>
                        </div>`;
                } else if (currentTab === 'completed') {
                    html += `
                        <p><strong>Plan Status:</strong> ${u.isVerified ? '<span style="color:var(--success)">Verified ✅</span>' : '<span style="color:var(--danger)">Not Active ❌</span>'}</p>
                        <div class="action-btns">
                            <button class="btn btn-warning" onclick="refund('${u.username}')">Refund +₹299</button>
                        </div>`;
                }

                html += `</div>`;
                list.innerHTML += html;
            });
        }

        // ====== Admin Actions ======

        function approvePlan(username) {
            if(confirm("Approve this plan?")) updateUserProp(username, { isVerified: true, planRequested: false });
        }
        
        function rejectPlan(username) {
            if(confirm("Reject this plan?")) updateUserProp(username, { planRequested: false, planUtr: "" });
        }

        // UPDATED: Approve Withdraw (Update History)
        function approveWithdraw(username) {
            if(confirm("Mark withdrawal as paid?")) {
                let users = getUsers();
                let u = users.find(x => x.username === username);
                
                // History ko Approved karna
                if(u.withdrawHistory && u.pendingWithdrawId) {
                    let historyItem = u.withdrawHistory.find(h => h.id === u.pendingWithdrawId);
                    if(historyItem) historyItem.status = 'Approved';
                }

                u.withdrawRequested = false;
                u.withdrawAmount = 0;
                u.pendingWithdrawId = null;

                saveUsers(users);
                loadAdminUI();
            }
        }

        // UPDATED: Reject Withdraw (Refund & Update History)
        function rejectWithdraw(username) {
            if(confirm("Reject withdrawal and return balance to user?")) {
                let users = getUsers();
                let u = users.find(x => x.username === username);
                
                u.balance += u.withdrawAmount; // Paisa wapas de diya

                // History ko Rejected karna
                if(u.withdrawHistory && u.pendingWithdrawId) {
                    let historyItem = u.withdrawHistory.find(h => h.id === u.pendingWithdrawId);
                    if(historyItem) historyItem.status = 'Rejected';
                }

                u.withdrawRequested = false;
                u.withdrawAmount = 0;
                u.pendingWithdrawId = null;

                saveUsers(users);
                loadAdminUI();
            }
        }

        function refund(username) {
            if(confirm("Add ₹299 to this user's balance?")) {
                let users = getUsers();
                let u = users.find(x => x.username === username);
                u.balance += 299;
                saveUsers(users);
                loadAdminUI();
                alert("₹299 added to user balance.");
            }
        }

        function updateUserProp(username, props) {
            let users = getUsers();
            let index = users.findIndex(u => u.username === username);
            users[index] = { ...users[index], ...props };
            saveUsers(users);
            loadAdminUI();
        }

        loadAdminUI();
    </script>
</body>
</html>
