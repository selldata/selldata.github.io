<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container { max-width: 600px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Admin Panel</h1>
            <p>Manage Users & Approvals</p>
        </div>
        <div id="usersList"></div>
    </div>

    <script src="app.js"></script>
    <script>
        function loadAdminUI() {
            const users = getUsers();
            const list = document.getElementById('usersList');
            list.innerHTML = "";

            if(users.length === 0) return list.innerHTML = "<p style='text-align:center;'>No registered users yet.</p>";

            users.forEach(u => {
                let html = `
                <div class="admin-card">
                    <h3>${u.name} (@${u.username})</h3>
                    <p>Balance: ₹${u.balance}</p>
                    <p>Verified Plan: ${u.isVerified ? '<span style="color:var(--success)">Yes</span>' : '<span style="color:var(--danger)">No</span>'}</p>
                    <div class="action-btns">
                        <button class="btn btn-success" onclick="refund('${u.username}')">Refund +₹299</button>
                    </div>`;

                if(u.planRequested && !u.isVerified) {
                    html += `
                    <div style="background:#334155; padding:10px; margin-top:10px; border-radius:5px;">
                        <p style="color:var(--warning)">Pending Plan Approval</p>
                        <p>UTR: ${u.planUtr}</p>
                        <div class="action-btns">
                            <button class="btn btn-success" onclick="approvePlan('${u.username}')">Approve Plan</button>
                            <button class="btn btn-danger" onclick="rejectPlan('${u.username}')">Reject Plan</button>
                        </div>
                    </div>`;
                }

                if(u.withdrawRequested) {
                    html += `
                    <div style="background:#334155; padding:10px; margin-top:10px; border-radius:5px;">
                        <p style="color:var(--warning)">Pending Withdrawal</p>
                        <p>Amount: ₹${u.withdrawAmount} | UPI: ${u.upiId}</p>
                        <div class="action-btns">
                            <button class="btn btn-success" onclick="approveWithdraw('${u.username}')">Approve Withdraw</button>
                            <button class="btn btn-danger" onclick="rejectWithdraw('${u.username}')">Reject Withdraw</button>
                        </div>
                    </div>`;
                }
                
                html += `</div>`;
                list.innerHTML += html;
            });
        }

        // Actions
        function approvePlan(username) {
            updateUserProp(username, { isVerified: true, planRequested: false });
        }
        
        function rejectPlan(username) {
            updateUserProp(username, { planRequested: false, planUtr: "" });
        }

        function approveWithdraw(username) {
            // Balance already reset by user, just clear request
            updateUserProp(username, { withdrawRequested: false, withdrawAmount: 0 });
        }

        function rejectWithdraw(username) {
            // Refund the deducted balance back
            let users = getUsers();
            let u = users.find(x => x.username === username);
            u.balance += u.withdrawAmount;
            u.withdrawRequested = false;
            u.withdrawAmount = 0;
            saveUsers(users);
            loadAdminUI();
        }

        function refund(username) {
            let users = getUsers();
            let u = users.find(x => x.username === username);
            u.balance += 299;
            saveUsers(users);
            loadAdminUI();
            alert("₹299 refunded to user balance.");
        }

        function updateUserProp(username, props) {
            let users = getUsers();
            let index = users.findIndex(u => u.username === username);
            users[index] = { ...users[index], ...props };
            saveUsers(users);
            loadAdminUI();
        }

        loadAdminUI();
    </script>
</body>
</html>
