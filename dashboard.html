<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 id="userNameText">Welcome</h2>
            <p id="statusText" style="color: var(--warning); font-size: 14px;"></p>
        </div>

        <div class="balance-card">
            <p>Wallet Balance</p>
            <h2 id="balanceText">₹0</h2>
        </div>

        <div class="circle-btn-container">
            <button id="actionBtn" class="circle-btn" onclick="toggleEarning()">START</button>
        </div>
    </div>

    <!-- Buy Plan Popup -->
    <div class="modal-overlay" id="planModal">
        <div class="modal-content">
            <h2>Buy Plan ₹299</h2>
            <p style="font-size: 14px; margin-bottom: 15px; color: var(--text-muted);">Please pay ₹299 to UPI: demo@upi and submit the UTR number below.</p>
            <input type="text" id="utrInput" placeholder="Enter UTR Number" style="margin-bottom: 15px;">
            <button class="btn" onclick="submitPlan()">Submit Payment</button>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="active">Dash</a>
        <a href="wallet.html">Wallet</a>
        <a href="balance.html">Withdraw</a>
        <a href="profile.html">Profile</a>
    </div>

    <script src="app.js"></script>
    <script>
        requireAuth();
        let user = getCurrentUser();
        let earningInterval = null;
        let isEarning = false;

        document.getElementById('userNameText').innerText = `Hello, ${user.name}`;
        updateBalanceUI();

        if(user.planRequested && !user.isVerified) {
            document.getElementById('statusText').innerText = "Status: Waiting for Admin Approval";
        }

        // Show popup after 30 seconds if plan not bought
        setTimeout(() => {
            user = getCurrentUser(); // Refresh state
            if(!user.planRequested && !user.isVerified) {
                document.getElementById('planModal').style.display = 'flex';
            }
        }, 30000);

        function submitPlan() {
            const utr = document.getElementById('utrInput').value.trim();
            if(!utr) return alert("Enter UTR number");
            user.planRequested = true;
            user.planUtr = utr;
            updateCurrentUser(user);
            document.getElementById('planModal').style.display = 'none';
            document.getElementById('statusText').innerText = "Status: Waiting for Admin Approval";
            alert("UTR submitted. Waiting for admin approval.");
        }

        function toggleEarning() {
            user = getCurrentUser();
            if(!user.isVerified) {
                return alert("You must buy the ₹299 plan and get admin approval before earning.");
            }

            const btn = document.getElementById('actionBtn');
            if(!isEarning) {
                // START EARNING
                isEarning = true;
                btn.innerText = "STOP";
                btn.classList.add("stop");
                earningInterval = setInterval(() => {
                    user.balance += 3;
                    updateCurrentUser(user);
                    updateBalanceUI();
                }, 5000);
            } else {
                // STOP EARNING
                isEarning = false;
                btn.innerText = "START";
                btn.classList.remove("stop");
                clearInterval(earningInterval);
            }
        }

        function updateBalanceUI() {
            document.getElementById('balanceText').innerText = `₹${user.balance}`;
        }
    </script>
</body>
</html>
