<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Withdraw Funds</h2>
        </div>

        <div class="balance-card">
            <p>Available Balance</p>
            <h2 id="balanceText">₹0</h2>
        </div>

        <p style="font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 20px;">
            Minimum withdrawal amount is ₹10. You must have a saved UPI ID in your wallet.
        </p>

        <!-- Status Show Hoga Agar Request Pending Hai -->
        <div id="withdrawStatus" style="margin-bottom: 20px;"></div>

        <!-- Withdraw Form -->
        <div id="withdrawForm">
            <div class="form-group">
                <label>Enter Amount</label>
                <input type="number" id="withdrawAmountInput" placeholder="Min ₹10">
            </div>
            <button class="btn" id="withdrawBtn" onclick="requestWithdraw()">Request Withdraw</button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="dashboard.html">Dash</a>
        <a href="wallet.html">Wallet</a>
        <a href="balance.html" class="active">Withdraw</a>
        <a href="profile.html">Profile</a>
    </div>

    <script src="app.js"></script>
    <script>
        requireAuth();
        let user = getCurrentUser();
        
        function loadUI() {
            user = getCurrentUser(); // Get latest data
            document.getElementById('balanceText').innerText = `₹${user.balance}`;

            const formDiv = document.getElementById('withdrawForm');
            const statusDiv = document.getElementById('withdrawStatus');

            // Agar pehle se pending request hai, toh input chupa do
            if(user.withdrawRequested) {
                formDiv.style.display = 'none';
                statusDiv.innerHTML = `
                    <div style="background: #334155; padding: 15px; border-radius: 8px; text-align: center; border-left: 4px solid var(--warning);">
                        <p style="color: var(--warning); font-weight: bold;">Pending Request</p>
                        <p style="font-size: 14px; margin-top: 5px;">Withdrawal of ₹${user.withdrawAmount} is waiting for admin approval.</p>
                    </div>`;
            } else {
                formDiv.style.display = 'block';
                statusDiv.innerHTML = "";
                document.getElementById('withdrawAmountInput').value = ""; // Clear input
            }
        }
        
        // Page load hone par UI update karo
        loadUI();

        function requestWithdraw() {
            // Checks
            if(!user.upiId) {
                return alert("Please add your UPI ID in the wallet first.");
            }
            if(user.withdrawRequested) {
                return alert("You already have a pending withdrawal request.");
            }

            const amountInput = document.getElementById('withdrawAmountInput').value.trim();
            const requestedAmount = Number(amountInput);

            // Validations
            if(!requestedAmount || requestedAmount < 10) {
                return alert("Minimum withdrawal amount is ₹10");
            }
            if(requestedAmount > user.balance) {
                return alert("Insufficient balance! You only have ₹" + user.balance);
            }

            // Processing: User ke balance se amount kaat lo aur pending me daal do
            user.balance -= requestedAmount;
            user.withdrawRequested = true;
            user.withdrawAmount = requestedAmount;
            
            updateCurrentUser(user);
            loadUI(); // UI Reload
            
            alert(`Withdrawal of ₹${requestedAmount} requested successfully! Waiting for admin approval.`);
        }
    </script>
</body>
</html>
