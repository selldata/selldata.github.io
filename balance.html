<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw & History</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Withdraw Funds</h2>
        </div>

        <div class="balance-card">
            <p>Available Balance</p>
            <h2 id="balanceText">₹0</h2>
        </div>

        <p style="font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 20px;">
            Minimum withdrawal amount is ₹10. You must have a saved UPI ID in your wallet.
        </p>

        <!-- Status Show Hoga Agar Request Pending Hai -->
        <div id="withdrawStatus" style="margin-bottom: 20px;"></div>

        <!-- Withdraw Form -->
        <div id="withdrawForm">
            <div class="form-group">
                <label>Enter Amount</label>
                <input type="number" id="withdrawAmountInput" placeholder="Min ₹10">
            </div>
            <button class="btn" id="withdrawBtn" onclick="requestWithdraw()">Request Withdraw</button>
        </div>

        <hr style="border: 1px solid #334155; margin: 30px 0;">

        <!-- Withdrawal History Section -->
        <div class="header" style="text-align: left; margin-bottom: 15px;">
            <h3>Withdrawal History</h3>
        </div>
        <div id="historyList"></div>
        <br><br>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="dashboard.html">Dash</a>
        <a href="wallet.html">Wallet</a>
        <a href="balance.html" class="active">Withdraw</a>
        <a href="profile.html">Profile</a>
    </div>

    <script src="app.js"></script>
    <script>
        requireAuth();
        let user = getCurrentUser();
        
        function loadUI() {
            user = getCurrentUser(); // Get latest data
            
            // Puraane users ke liye history array banayein (Error se bachne ke liye)
            if(!user.withdrawHistory) user.withdrawHistory = [];

            document.getElementById('balanceText').innerText = `₹${user.balance}`;

            const formDiv = document.getElementById('withdrawForm');
            const statusDiv = document.getElementById('withdrawStatus');

            // Agar pending request hai
            if(user.withdrawRequested) {
                formDiv.style.display = 'none';
                statusDiv.innerHTML = `
                    <div style="background: #334155; padding: 15px; border-radius: 8px; text-align: center; border-left: 4px solid var(--warning);">
                        <p style="color: var(--warning); font-weight: bold;">Pending Request</p>
                        <p style="font-size: 14px; margin-top: 5px;">Withdrawal of ₹${user.withdrawAmount} is waiting for admin approval.</p>
                    </div>`;
            } else {
                formDiv.style.display = 'block';
                statusDiv.innerHTML = "";
                document.getElementById('withdrawAmountInput').value = "";
            }

            // History Load Karna
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = "";
            
            if(user.withdrawHistory.length === 0) {
                historyList.innerHTML = "<p style='text-align:center; color:var(--text-muted); font-size: 14px;'>No history found.</p>";
            } else {
                // Reverse karenge taaki latest history sabse upar dikhe
                let reversedHistory = [...user.withdrawHistory].reverse();
                reversedHistory.forEach(item => {
                    let color = item.status === 'Approved' ? 'var(--success)' : 
                                item.status === 'Rejected' ? 'var(--danger)' : 'var(--warning)';
                    
                    let icon = item.status === 'Approved' ? '✅' : 
                               item.status === 'Rejected' ? '❌' : '⏳';

                    historyList.innerHTML += `
                        <div style="background: var(--card); padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid ${color}; display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h3 style="margin-bottom: 5px;">₹${item.amount}</h3>
                                <p style="font-size:11px; color:var(--text-muted);">${item.date}</p>
                            </div>
                            <div style="color: ${color}; font-size: 13px; font-weight: 600; text-align: right;">
                                ${icon} ${item.status}
                            </div>
                        </div>
                    `;
                });
            }
        }
        
        loadUI();

        function requestWithdraw() {
            if(!user.upiId) return alert("Please add your UPI ID in the wallet first.");
            if(user.withdrawRequested) return alert("You already have a pending withdrawal request.");

            const amountInput = document.getElementById('withdrawAmountInput').value.trim();
            const requestedAmount = Number(amountInput);

            if(!requestedAmount || requestedAmount < 10) return alert("Minimum withdrawal amount is ₹10");
            if(requestedAmount > user.balance) return alert("Insufficient balance! You only have ₹" + user.balance);

            // Naya History ID aur Date
            const historyId = Date.now();
            const dateStr = new Date().toLocaleString();

            // Amount katna aur pending true karna
            user.balance -= requestedAmount;
            user.withdrawRequested = true;
            user.withdrawAmount = requestedAmount;
            user.pendingWithdrawId = historyId; // Link karne ke liye

            // History array me save karna
            user.withdrawHistory.push({
                id: historyId,
                amount: requestedAmount,
                date: dateStr,
                status: 'Pending'
            });
            
            updateCurrentUser(user);
            loadUI();
            
            alert(`Withdrawal of ₹${requestedAmount} requested successfully!`);
        }
    </script>
</body>
</html>
