<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Profile</h2>
        </div>
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="nameInput">
        </div>
        <div class="form-group">
            <label>Username (Read Only)</label>
            <input type="text" id="usernameInput" readonly style="opacity: 0.7;">
        </div>
        <button class="btn" onclick="updateName()">Update Name</button>
        <button class="btn btn-danger" onclick="logout()" style="margin-top: 30px;">Logout</button>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html">Dash</a>
        <a href="wallet.html">Wallet</a>
        <a href="balance.html">Withdraw</a>
        <a href="profile.html" class="active">Profile</a>
    </div>

    <script src="app.js"></script>
    <script>
        requireAuth();
        let user = getCurrentUser();
        document.getElementById('nameInput').value = user.name;
        document.getElementById('usernameInput').value = user.username;

        function updateName() {
            const newName = document.getElementById('nameInput').value.trim();
            if(!newName) return alert("Name cannot be empty");
            user.name = newName;
            updateCurrentUser(user);
            alert("Name updated successfully!");
        }
    </script>
</body>
</html>
