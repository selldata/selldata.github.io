<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <style>
    body {background:#0f172a; color:white; text-align:center; font-family:Arial;}
    input,button {padding:10px; margin:10px; border-radius:8px;}
    button {background:#22c55e; color:white;}
  </style>
</head>
<body>

<h2>Create Account</h2>

<input id="name" placeholder="Name"><br>
<input id="user" placeholder="Username"><br>

<button onclick="signup()">Register</button>

<p>Already have account? <a href="login.html" style="color:lightblue;">Login</a></p>

<script>
function signup(){
  let name=document.getElementById("name").value;
  let user=document.getElementById("user").value;

  localStorage.setItem(user, JSON.stringify({
    name, balance:0, upi:"",
    plan:false, verified:false
  }));

  alert("Account created!");
  window.location="login.html";
}
</script>

</body>
</html>
