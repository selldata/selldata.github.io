<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="margin-top: 50px;">
        
        <!-- Fully Highlighted Heading -->
        <p style="text-align: center; font-size: 38px; font-weight: bold; margin-bottom: 20px; line-height: 1.8;">
            <span style="background-color: #FFCC00; color: black; padding: 3px 6px; border-radius: 4px;">Start</span> 
            <span style="background-color: green; color: white; padding: 3px 6px; border-radius: 4px;">Earning</span> 
            <span style="background-color: blue; color: white; padding: 3px 6px; border-radius: 4px;">by</span> 
            <span style="background-color: black; color: white; padding: 3px 6px; border-radius: 4px;">selling</span> 
            <span style="background-color: black; color: white; padding: 3px 6px; border-radius: 4px;">Your</span> 
            <span style="background-color: navy; color: white; padding: 3px 6px; border-radius: 4px;">Internet</span> 
            <span style="background-color: darkgreen; color: white; padding: 3px 6px; border-radius: 4px;">Data</span>
        </p>

        <div class="header">
            <h1>Welcome Back</h1>
        </div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username">
        </div>
        <button class="btn" onclick="login()">Login</button>
        <p style="text-align: center; margin-top: 20px;">
            <a href="register.html" style="color: var(--primary);">New user? Register</a>
        </p>
    </div>

    <script src="app.js"></script>
    <script>
        function login() {
            const username = document.getElementById('username').value.trim();
            let users = getUsers();
            let user = users.find(u => u.username === username);

            if(user) {
                localStorage.setItem('currentUser', username);
                window.location.href = 'dashboard.html';
            } else {
                alert("Username not found!");
            }
        }
    </script>
</body>
</html>
